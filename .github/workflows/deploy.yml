name: CI/CD

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  ci:
    runs-on: ubuntu-latest
    name: Build and Test
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '26'
          cache: 'npm'
      - name: Install dependencies
        run: npm ci
      - name: Type check and lint
        run: npm run lint
      - name: Build
        run: npm run build
      - name: Upload dist
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/

  check-secrets:
    runs-on: ubuntu-latest
    needs: ci
    outputs:
      secrets_ok: ${{ steps.check.outputs.secrets_ok }}
    steps:
      - id: check
        run: |
          missing=()
          [ -z "$CLOUDFLARE_API_TOKEN" ] && missing+=("CLOUDFLARE_API_TOKEN")
          [ -z "$WRANGLER_TOML" ]        && missing+=("WRANGLER_TOML")
          if [ ${#missing[@]} -gt 0 ]; then
            echo "::warning::Secrets manquants : ${missing[*]} — déploiement ignoré."
            echo "Configurez-les dans Settings > Secrets and variables > Actions."
            echo "secrets_ok=false" >> "$GITHUB_OUTPUT"
          else
            echo "secrets_ok=true" >> "$GITHUB_OUTPUT"
          fi
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          WRANGLER_TOML: ${{ secrets.WRANGLER_TOML }}

  deploy:
    runs-on: ubuntu-latest
    name: Deploy to Cloudflare
    needs: [ci, check-secrets]
    if: needs.check-secrets.outputs.secrets_ok == 'true'
    steps:
      - uses: actions/checkout@v4
      - name: Download dist
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/
      - name: Generate wrangler.toml
        run: echo "$WRANGLER_TOML" > wrangler.toml
        env:
          WRANGLER_TOML: ${{ secrets.WRANGLER_TOML }}
      - name: Deploy
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          wranglerVersion: '4.90.0'
          command: deploy
